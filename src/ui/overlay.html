<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DotaPartner Overlay</title>
    <link rel="stylesheet" href="./overlay.css" />
  </head>
  <body>
    <main class="overlay-card">
      <div class="drag-strip" title="Drag overlay" aria-label="Drag overlay">
        <span class="drag-dots">:::</span>
        <span class="drag-label">Drag</span>
      </div>

      <button
        type="button"
        class="floating-close-button"
        id="close-button"
        title="Quit"
        aria-label="Quit overlay"
      >
        ×
      </button>

      <div class="content-shell">
        <div class="eyebrow">DotaPartner</div>
        <div class="headline" id="headline">HelloWorld</div>
        <div class="meta" id="meta">Overlay prototype is running</div>

        <div class="status-row">
          <div class="status-pill" id="connection-status">Waiting for GSI</div>
          <div class="status-pill muted" id="game-state">State: waiting</div>
        </div>

        <div class="compact-summary" id="compact-summary">
          <div class="compact-line" id="compact-primary">Overlay ready</div>
          <div class="compact-line compact-secondary" id="compact-secondary">
            Start Dota 2 to continue
          </div>
        </div>

        <section class="debug-panel" id="debug-panel">
          <div class="section-title">Debug Status</div>
          <div class="payload-grid">
            <div class="payload-label">Player</div>
            <div class="payload-value" id="player-name">unknown</div>
            <div class="payload-label">Hero</div>
            <div class="payload-value" id="hero-name">unknown</div>
            <div class="payload-label">Game Time</div>
            <div class="payload-value" id="game-time">n/a</div>
            <div class="payload-label">Dota</div>
            <div class="payload-value" id="dota-status">not running</div>
            <div class="payload-label">GSI</div>
            <div class="payload-value" id="gsi-status">not listening</div>
            <div class="payload-label">Data</div>
            <div class="payload-value" id="data-status">no data</div>
          </div>
        </section>

        <div class="hint" id="hint">Press Ctrl+Shift+Q to quit</div>
        <div class="hint debug-hint" id="debug-hint">Debug mode is enabled</div>
      </div>
    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
